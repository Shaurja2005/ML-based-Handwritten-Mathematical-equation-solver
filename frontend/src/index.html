<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Handwritten Math Solver</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div id="app-shell">
      <header id="toolbar">
        <div id="window-chrome" aria-hidden="true">
          <span class="chrome-dot dot-red"></span>
          <span class="chrome-dot dot-yellow"></span>
          <span class="chrome-dot dot-green"></span>
        </div>
        <div id="toolbar-title">Handwritten Math Solver</div>
        <div id="toolbar-actions">
          <button id="themeToggleBtn" type="button">Dark Mode</button>
          <button id="historyBtn" type="button">History</button>
          <button id="plotBtn" type="button">Plot</button>
          <button id="addEqBtn" type="button">Add Eq</button>
          <button id="powerBtn" type="button">Power</button>
          <button id="solveBtn" type="button">Solve</button>
          <button id="undoBtn" type="button">Undo</button>
          <button id="clearBtn" type="button">Clear</button>
        </div>
      </header>

      <main id="canvas-stage">
        <div id="main-content">
          <div id="canvas-container">
            <canvas id="display-canvas"></canvas>
            <canvas id="drawing-canvas"></canvas>
          </div>
        </div>
        <aside id="history-sidebar" class="hidden">
          <div class="history-header">
            <h3>History</h3>
            <button id="closeHistoryBtn" type="button">&times;</button>
          </div>
          <ul id="history-list"></ul>
        </aside>
      </main>

      <footer id="bottom-bar">
        <div id="equation-bar">
          <span id="equation-label">Equation</span>
          <span id="equation-display"></span>
          <span id="equation-result"></span>
        </div>
        <div id="status-bar">
          <span id="status-text">Draw a character to begin</span>
          <span id="confidence-text"></span>
        </div>
      </footer>
    </div>

    <!-- Plot Modal -->
    <div id="plot-modal" class="hidden">
      <div class="plot-modal-content">
        <div class="plot-header">
          <h3>Function Plot</h3>
          <button id="closePlotBtn" type="button">&times;</button>
        </div>
        <div class="plot-body">
          <canvas id="plot-canvas"></canvas>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
